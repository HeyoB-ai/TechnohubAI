<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI met TechnoHUB – Metrolijn</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Segoe UI', Arial, sans-serif;
  padding: 20px;
}
h2 {
  color: white;
  margin-bottom: 16px;
  font-size: 18px;
  opacity: 0.7;
  letter-spacing: 1px;
}
.container {
  position: relative;
  width: min(1100px, 100%);
}
.container img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 4px;
  box-shadow: 0 12px 50px rgba(0,0,0,0.5);
}

/* Clickable hotspot zones */
.zone {
  position: absolute;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.2s;
}
.zone:hover {
  background: rgba(255,255,255,0.15);
  outline: 2px solid rgba(255,255,255,0.5);
}

/* Tooltip */
#tooltip {
  position: fixed;
  background: rgba(15,15,15,0.95);
  color: white;
  padding: 14px 18px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.6;
  max-width: 300px;
  z-index: 9999;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  box-shadow: 0 6px 30px rgba(0,0,0,0.5);
  border-left: 4px solid #D62828;
}
#tooltip.show { opacity: 1; }
#tooltip .tip-title {
  color: #ff9999;
  font-weight: 800;
  font-size: 15px;
  display: block;
  margin-bottom: 6px;
}

/* Info panel */
#panel {
  position: absolute;
  background: white;
  border-radius: 10px;
  padding: 18px 22px;
  max-width: 280px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  z-index: 100;
  display: none;
  border-top: 5px solid #D62828;
}
#panel.show { display: block; }
#panel h3 { color: #D62828; font-size: 16px; margin-bottom: 8px; }
#panel p { font-size: 13px; line-height: 1.6; color: #333; }
#panel .close-btn {
  position: absolute; top: 8px; right: 12px;
  cursor: pointer; font-size: 18px; color: #999;
}
#panel .close-btn:hover { color: #333; }

/* Pulse animation for interactive hint */
@keyframes pulse {
  0%,100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}
.hint {
  position: absolute;
  bottom: -30px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.5);
  font-size: 13px;
  white-space: nowrap;
  animation: pulse 2.5s infinite;
}
</style>
</head>

<!-- Info panel (click) -->
<div id="panel">
  <span class="close-btn" onclick="closePanel()">✕</span>
  <h3 id="panel-title"></h3>
  <p id="panel-text"></p>
</div>

<!-- Tooltip (hover) -->
<div id="tooltip"></div>

<script>
const tooltip = document.getElementById('tooltip');
const panel = document.getElementById('panel');
const map = document.getElementById('map');

document.querySelectorAll('.zone').forEach(zone => {
  // Hover: show tooltip
  zone.addEventListener('mouseenter', e => {
    tooltip.innerHTML = '<span class="tip-title">' + zone.dataset.title + '</span>' + zone.dataset.text;
    tooltip.classList.add('show');
    move(e);
    zone.addEventListener('mousemove', move);
  });
  zone.addEventListener('mouseleave', () => {
    tooltip.classList.remove('show');
    zone.removeEventListener('mousemove', move);
  });

  // Click: show panel
  zone.addEventListener('click', e => {
    e.stopPropagation();
    tooltip.classList.remove('show');

    const rect = map.getBoundingClientRect();
    const zRect = zone.getBoundingClientRect();

    panel.style.display = 'block';
    panel.classList.add('show');
    document.getElementById('panel-title').textContent = zone.dataset.title;
    document.getElementById('panel-text').innerHTML = zone.dataset.text;

    // Position panel near click but within viewport
    let px = zRect.right - rect.left + 8;
    let py = zRect.top - rect.top;
    if (px + 290 > rect.width) px = zRect.left - rect.left - 295;
    if (py + 200 > rect.height) py = rect.height - 210;
    panel.style.left = px + 'px';
    panel.style.top  = py + 'px';
  });
});

document.addEventListener('click', closePanel);

function closePanel() {
  panel.classList.remove('show');
  panel.style.display = 'none';
}

function move(e) {
  let x = e.clientX + 16, y = e.clientY - 12;
  if (x + 320 > window.innerWidth) x = e.clientX - 326;
  if (y + 150 > window.innerHeight) y = e.clientY - 130;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}
</script>
